    <main>
    <div class="container py-5 d-flex justify-content-center">
      <div class="card shadow-lg p-4" style="max-width: 500px; width: 100%">
        <h3 class="mb-4 text-center">Faça a sua reserva</h3>

        <form id="reservationForm">
          <!-- Nome -->
          <div class="mb-3">
            <label class="form-label required">Nome</label>
            <input type="text" class="form-control" id="nome" required />
          </div>

          <!-- Telefone -->
          <div class="mb-3">
            <label class="form-label required">Telefone</label>
            <input type="tel" class="form-control" id="telefone" required />
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label class="form-label required">Email</label>
            <input type="email" class="form-control" id="email" required />
          </div>

          <!-- Pessoas -->
          <div class="mb-3">
            <label class="form-label required">Quantidade de pessoas</label>
            <input
              type="number"
              class="form-control"
              id="pessoas"
              min="1"
              max="5"
              required
            />
          </div>

          <!-- Data (CALENDÁRIO) -->
          <div class="mb-3">
            <label class="form-label required">Data</label>
            <input type="date" class="form-control" id="data" required />
          </div>

          <!-- Hora -->
          <div class="mb-3">
            <label class="form-label required">Hora</label>
            <input type="time" class="form-control" id="hora" required />
          </div>

          <!-- Botão -->
          <button id="reserve" type="submit" class="btn btn-dark w-100">Reservar</button>
        </form>
      </div>
    </div>
